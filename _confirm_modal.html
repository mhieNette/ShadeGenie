<div class="sg-confirm-overlay" id="sgConfirmOverlay" hidden>
  <div class="sg-confirm-modal" role="dialog" aria-modal="true"
       aria-labelledby="sgConfirmTitle" aria-describedby="sgConfirmText">
    <div class="sg-confirm-header">
      <div class="sg-confirm-badge" aria-hidden="true">!</div>

      <div>
        <div class="sg-confirm-title" id="sgConfirmTitle">Confirm</div>
        <div class="sg-confirm-text" id="sgConfirmText">Are you sure?</div>
      </div>

      <button class="sg-confirm-x" type="button" aria-label="Close" data-sg-confirm-cancel>×</button>
    </div>

    <div class="sg-confirm-actions">
      <button class="sg-confirm-btn sg-confirm-cancel" type="button" data-sg-confirm-cancel>Cancel</button>
      <button class="sg-confirm-btn sg-confirm-ok" type="button" data-sg-confirm-ok>Confirm</button>
    </div>
  </div>
</div>
